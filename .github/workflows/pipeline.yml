name: ML Pipeline - Validate and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      mock_accuracy:
        description: Optional accuracy override (e.g. 0.70 fail, 0.95 pass)
        required: false
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull Data with DVC
        run: |
          dvc pull || echo "No DVC remote configured, skipping..."

      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
          MOCK_ACCURACY: ${{ github.event.inputs.mock_accuracy }}
        run: |
          python train.py

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          if-no-files-found: error

      - name: Upload mlruns artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-data
          path: mlruns/
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model-info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - name: Download mlruns artifact
        uses: actions/download-artifact@v4
        with:
          name: mlruns-data
          path: .

      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
          ACCURACY_THRESHOLD: "0.85"
        run: |
          python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build --build-arg RUN_ID=$(cat model_info.txt) -t ml-model:$(cat model_info.txt) .
          echo "Docker image built successfully!"